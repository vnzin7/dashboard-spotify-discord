<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Token Manager - Painel de Controle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #fff;
        }
        .navbar {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .token-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .token-item {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid #667eea;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        .status-online { color: #4caf50; }
        .status-offline { color: #f44336; }
        .status-idle { color: #ff9800; }
        .webhook-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
        pre {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            color: #4caf50;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fa fa-discord" aria-hidden="true"></i> Discord Token Manager v2.0
            </span>
            <div class="d-flex">
                <span class="text-light me-3">
                    <i class="fa fa-database"></i> Tokens: <span id="totalTokens">0</span>
                </span>
                <span class="text-light">
                    <i class="fa fa-users"></i> Online: <span id="onlineCount">0</span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total Tokens</h5>
                        <h2 id="statTotal">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white" style="background: linear-gradient(135deg, #4caf50, #2196f3);">
                    <div class="card-body">
                        <h5 class="card-title">Online</h5>
                        <h2 id="statOnline">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white" style="background: linear-gradient(135deg, #ff9800, #f44336);">
                    <div class="card-body">
                        <h5 class="card-title">Offline</h5>
                        <h2 id="statOffline">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white" style="background: linear-gradient(135deg, #9c27b0, #e91e63);">
                    <div class="card-body">
                        <h5 class="card-title">Nitro</h5>
                        <h2 id="statNitro">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fa fa-plus-circle"></i> Adicionar Token</h5>
                    </div>
                    <div class="card-body">
                        <textarea id="tokenInput" class="form-control mb-3" rows="3" placeholder="Cole os tokens aqui (um por linha)&#10;Ex:&#10;MTIzNDU2Nzg5MDEyMzQ1Njc4OQ.XXXXXX.XXXXXX&#10;ODk3NjU0MzIxMDk4NzY1NDMyMQ.XXXXXX.XXXXXX"></textarea>
                        <button class="btn btn-primary w-100" onclick="addTokens()">
                            <i class="fa fa-upload"></i> Adicionar Tokens
                        </button>
                        <hr>
                        <button class="btn btn-danger w-100 mt-2" onclick="clearAll()">
                            <i class="fa fa-trash"></i> Limpar Todos
                        </button>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fa fa-cog"></i> Configurações</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="autoCheck" onchange="toggleAutoCheck()">
                            <label class="form-check-label">Verificar status automaticamente (a cada 30s)</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="webhookEnabled" onchange="toggleWebhook()">
                            <label class="form-check-label">Enviar logs para Webhook</label>
                        </div>
                        <input type="text" id="webhookUrl" class="form-control mt-2" placeholder="URL do Webhook Discord" style="display:none;">
                        <button class="btn btn-secondary w-100 mt-2" onclick="exportTokens()">
                            <i class="fa fa-download"></i> Exportar Tokens
                        </button>
                        <button class="btn btn-secondary w-100 mt-2" onclick="importTokens()">
                            <i class="fa fa-upload"></i> Importar Tokens (JSON)
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fa fa-list"></i> Lista de Tokens</h5>
                        <button class="btn btn-sm btn-primary float-end" onclick="checkAllStatus()">
                            <i class="fa fa-refresh"></i> Verificar Todos
                        </button>
                    </div>
                    <div class="card-body token-list" id="tokenList">
                        <div class="text-center text-muted">
                            <i class="fa fa-inbox fa-3x"></i>
                            <p>Nenhum token adicionado</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="webhook-status">
        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" id="statusToast">
            <div class="toast-header">
                <strong class="me-auto">Sistema</strong>
                <small>agora</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Sistema inicializado
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let tokens = [];
        let autoCheckInterval = null;
        let webhookUrl = localStorage.getItem('webhookUrl') || '';
        
        function loadTokens() {
            const saved = localStorage.getItem('discord_tokens');
            if (saved) {
                tokens = JSON.parse(saved);
                renderTokens();
                updateStats();
            }
        }
        
        function saveTokens() {
            localStorage.setItem('discord_tokens', JSON.stringify(tokens));
            updateStats();
        }
        
        function addTokens() {
            const input = document.getElementById('tokenInput').value;
            const lines = input.split('\n').filter(l => l.trim());
            
            lines.forEach(token => {
                const cleanToken = token.trim();
                if (cleanToken && !tokens.find(t => t.token === cleanToken)) {
                    tokens.push({
                        token: cleanToken,
                        status: 'checking',
                        user: null,
                        lastCheck: null
                    });
                }
            });
            
            document.getElementById('tokenInput').value = '';
            saveTokens();
            renderTokens();
            checkAllStatus();
            showToast(`${lines.length} tokens adicionados com sucesso!`);
        }
        
        async function checkTokenStatus(tokenObj, index) {
            try {
                const response = await fetch('https://discord.com/api/v9/users/@me', {
                    headers: {
                        'Authorization': tokenObj.token
                    }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    tokenObj.status = 'online';
                    tokenObj.user = {
                        id: userData.id,
                        username: userData.username,
                        discriminator: userData.discriminator,
                        avatar: userData.avatar,
                        email: userData.email,
                        phone: userData.phone,
                        nitro: userData.premium_type ? true : false,
                        mfa_enabled: userData.mfa_enabled
                    };
                    tokenObj.lastCheck = new Date().toISOString();
                    
                    if (document.getElementById('webhookEnabled').checked && webhookUrl) {
                        sendWebhookNotification(tokenObj.user, 'online');
                    }
                } else if (response.status === 401) {
                    tokenObj.status = 'invalid';
                    tokenObj.user = null;
                } else {
                    tokenObj.status = 'offline';
                    tokenObj.user = null;
                }
            } catch (error) {
                tokenObj.status = 'error';
                tokenObj.user = null;
            }
            
            saveTokens();
            renderTokens();
            updateStats();
        }
        
        async function checkAllStatus() {
            showToast('Verificando status de todos os tokens...', 'info');
            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].status !== 'checking') {
                    await checkTokenStatus(tokens[i], i);
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
            showToast('Verificação concluída!', 'success');
        }
        
        function renderTokens() {
            const container = document.getElementById('tokenList');
            if (tokens.length === 0) {
                container.innerHTML = '<div class="text-center text-muted"><i class="fa fa-inbox fa-3x"></i><p>Nenhum token adicionado</p></div>';
                return;
            }
            
            let html = '';
            tokens.forEach((token, index) => {
                const statusClass = token.status === 'online' ? 'status-online' : 
                                   (token.status === 'offline' ? 'status-offline' : 
                                   (token.status === 'invalid' ? 'status-offline' : 'status-idle'));
                const statusText = token.status === 'online' ? 'Online' :
                                  (token.status === 'offline' ? 'Offline' :
                                  (token.status === 'invalid' ? 'Inválido' : 'Verificando...'));
                
                html += `
                    <div class="token-item">
                        <div class="row">
                            <div class="col-8">
                                <strong>${token.user ? `${token.user.username}#${token.user.discriminator}` : 'Token ' + (index+1)}</strong>
                                <br>
                                <small class="text-muted">${token.token.substring(0, 20)}...</small>
                                ${token.user && token.user.nitro ? '<span class="badge bg-warning ms-2">Nitro</span>' : ''}
                                ${token.user && token.user.email ? '<span class="badge bg-info ms-2">Email Verificado</span>' : ''}
                            </div>
                            <div class="col-4 text-end">
                                <span class="${statusClass}">● ${statusText}</span>
                                <br>
                                <button class="btn btn-sm btn-danger mt-1" onclick="removeToken(${index})">
                                    <i class="fa fa-trash"></i>
                                </button>
                                <button class="btn btn-sm btn-info mt-1" onclick="copyToken('${token.token}')">
                                    <i class="fa fa-copy"></i>
                                </button>
                            </div>
                        </div>
                        ${token.user ? `
                        <div class="row mt-2">
                            <div class="col-12">
                                <small>
                                    <i class="fa fa-envelope"></i> ${token.user.email || 'Sem email'} | 
                                    <i class="fa fa-phone"></i> ${token.user.phone || 'Sem telefone'} |
                                    <i class="fa fa-id-card"></i> ID: ${token.user.id}
                                </small>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function removeToken(index) {
            tokens.splice(index, 1);
            saveTokens();
            renderTokens();
            updateStats();
            showToast('Token removido!');
        }
        
        function copyToken(token) {
            navigator.clipboard.writeText(token);
            showToast('Token copiado para a área de transferência!');
        }
        
        function clearAll() {
            if (confirm('Tem certeza que deseja remover TODOS os tokens?')) {
                tokens = [];
                saveTokens();
                renderTokens();
                updateStats();
                showToast('Todos os tokens foram removidos!');
            }
        }
        
        function updateStats() {
            const total = tokens.length;
            const online = tokens.filter(t => t.status === 'online').length;
            const offline = tokens.filter(t => t.status === 'offline' || t.status === 'invalid').length;
            const nitro = tokens.filter(t => t.user && t.user.nitro).length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statOnline').textContent = online;
            document.getElementById('statOffline').textContent = offline;
            document.getElementById('statNitro').textContent = nitro;
            
            document.getElementById('totalTokens').textContent = total;
            document.getElementById('onlineCount').textContent = online;
        }
        
        function toggleAutoCheck() {
            const enabled = document.getElementById('autoCheck').checked;
            if (enabled) {
                autoCheckInterval = setInterval(() => {
                    checkAllStatus();
                }, 30000);
                showToast('Auto-verificação ativada (30 segundos)');
            } else {
                if (autoCheckInterval) {
                    clearInterval(autoCheckInterval);
                    showToast('Auto-verificação desativada');
                }
            }
        }
        
        function toggleWebhook() {
            const enabled = document.getElementById('webhookEnabled').checked;
            const urlInput = document.getElementById('webhookUrl');
            urlInput.style.display = enabled ? 'block' : 'none';
            
            if (enabled && webhookUrl) {
                urlInput.value = webhookUrl;
            }
            
            if (!enabled) {
                localStorage.removeItem('webhookUrl');
            }
        }
        
        function sendWebhookNotification(user, event) {
            if (!webhookUrl) return;
            
            const embed = {
                title: `📢 Notificação de Token`,
                description: `Evento: **${event === 'online' ? 'Token Online' : 'Token Offline'}**`,
                color: event === 'online' ? 0x4caf50 : 0xf44336,
                fields: [
                    { name: 'Usuário', value: `${user.username}#${user.discriminator}`, inline: true },
                    { name: 'ID', value: user.id, inline: true },
                    { name: 'Email', value: user.email || 'Não verificado', inline: true },
                    { name: 'Nitro', value: user.nitro ? '✅ Sim' : '❌ Não', inline: true },
                    { name: '2FA', value: user.mfa_enabled ? '✅ Ativado' : '❌ Desativado', inline: true }
                ],
                timestamp: new Date().toISOString(),
                footer: { text: 'Discord Token Manager' }
            };
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ embeds: [embed] })
            }).catch(console.error);
        }
        
        function exportTokens() {
            const dataStr = JSON.stringify(tokens, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `discord_tokens_${new Date().toISOString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Tokens exportados com sucesso!');
        }
        
        function importTokens() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        tokens = imported;
                        saveTokens();
                        renderTokens();
                        checkAllStatus();
                        showToast('Tokens importados com sucesso!');
                    } catch (error) {
                        showToast('Erro ao importar arquivo!', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('statusToast');
            const toast = new bootstrap.Toast(toastEl);
            document.getElementById('toastMessage').textContent = message;
            toast.show();
        }
        
        loadTokens();
        
        if (webhookUrl) {
            document.getElementById('webhookEnabled').checked = true;
            document.getElementById('webhookUrl').value = webhookUrl;
            document.getElementById('webhookUrl').style.display = 'block';
        }
        
        document.getElementById('webhookUrl').addEventListener('change', (e) => {
            webhookUrl = e.target.value;
            localStorage.setItem('webhookUrl', webhookUrl);
        });
    </script>
</body>
</html>
